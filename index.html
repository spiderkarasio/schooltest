<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Gemini Vision Proxy</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 20px auto; background: #eee; padding: 10px; }
        #chat { height: 350px; border: 1px solid #ccc; overflow-y: auto; padding: 10px; background: white; border-radius: 8px; margin-bottom: 10px; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 5px; background: #f9f9f9; }
        .controls { display: flex; flex-direction: column; gap: 10px; }
        input[type="text"] { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .btn-group { display: flex; gap: 5px; }
        button { flex: 1; padding: 10px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        button:disabled { background: #ccc; }
        #preview { max-width: 100%; max-height: 100px; display: none; margin-top: 5px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="chat"><h3>Чат с Gemini (Текст + Фото)</h3></div>
    
    <div class="controls">
        <input type="file" id="fileInput" accept="image/*" onchange="previewImage()">
        <img id="preview">
        <input type="text" id="userInput" placeholder="Введите вопрос...">
        <div class="btn-group">
            <button id="sendBtn" onclick="send()">Отправить</button>
            <button onclick="clearChat()" style="background:#6c757d">Очистить</button>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://workers.dev'; // ПРОВЕРЬ URL!

        let selectedImageBase64 = null;
        let selectedImageType = null;

        function previewImage() {
            const file = document.getElementById('fileInput').files[0];
            const preview = document.getElementById('preview');
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    // Убираем префикс "data:image/jpeg;base64," для API
                    selectedImageBase64 = e.target.result.split(',')[1];
                    selectedImageType = file.type;
                };
                reader.readAsDataURL(file);
            }
        }

        async function send() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const btn = document.getElementById('sendBtn');
            const text = input.value.trim();

            if (!text && !selectedImageBase64) return;

            // Визуально добавляем сообщение
            chat.innerHTML += `<div class="msg"><b>Вы:</b> ${text} ${selectedImageBase64 ? '(с картинкой)' : ''}</div>`;
            
            // Сброс полей
            const currentMsg = text;
            const currentImg = selectedImageBase64;
            const currentImgType = selectedImageType;
            
            input.value = '';
            document.getElementById('fileInput').value = '';
            document.getElementById('preview').style.display = 'none';
            selectedImageBase64 = null;
            
            btn.disabled = true;
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: currentMsg, 
                        imageBase64: currentImg,
                        imageType: currentImgType
                    })
                });
                
                const data = await response.json();
                chat.innerHTML += `<div class="msg" style="background:#e3f2fd"><b>Бот:</b> ${data.reply}</div>`;
            } catch (err) {
                chat.innerHTML += `<div class="msg" style="color:red">Ошибка соединения</div>`;
            } finally {
                btn.disabled = false;
                chat.scrollTop = chat.scrollHeight;
            }
        }

        function clearChat() { document.getElementById('chat').innerHTML = ''; }
    </script>
</body>
</html>
