<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Gemini Proxy Chat</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; }
        #chat { height: 300px; border: 1px solid #ccc; overflow-y: auto; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        .msg { margin-bottom: 10px; }
        input { width: 75%; padding: 8px; }
        button { padding: 8px 15px; }
    </style>
</head>
<body>

    <h3>Чат через сервер в США</h3>
    <div id="chat"></div>
    <input type="text" id="userInput" placeholder="Напишите что-нибудь...">
    <button onclick="send()">Отправить</button>

    <script>
        // Укажите IP вашего сервера в Америке
        const SERVER_URL = 'https://9d6d7307f0b238.lhr.life/chat';

        async function send() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const message = input.value;
            if (!message) return;

            chat.innerHTML += `<div class="msg"><b>Вы:</b> ${message}</div>`;
            input.value = '';

            try {
                const response = await fetch(SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();
                const reply = data.reply || "Ошибка: " + data.error;
                chat.innerHTML += `<div class="msg"><b>Бот:</b> ${reply}</div>`;
            } catch (err) {
                chat.innerHTML += `<div style="color:red">Сервер недоступен</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
