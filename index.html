<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Proxy Chat</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; background: #f0f2f5; padding: 15px; }
        #chat { height: 400px; border: 1px solid #ccc; overflow-y: auto; padding: 15px; background: white; border-radius: 10px; margin-bottom: 15px; }
        .msg { margin-bottom: 12px; padding: 10px; border-radius: 8px; }
        .user-msg { background: #e3f2fd; }
        .bot-msg { background: #f1f8e9; }
        .controls { display: flex; flex-direction: column; gap: 10px; background: white; padding: 15px; border-radius: 10px; border: 1px solid #ddd; }
        input[type="text"] { padding: 12px; border: 1px solid #ddd; border-radius: 6px; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 6px; font-weight: bold; }
        button:disabled { background: #ccc; }
        #preview { max-width: 100%; max-height: 150px; display: none; margin: 10px 0; border-radius: 6px; border: 1px dashed #ccc; }
        .hint { font-size: 12px; color: #666; margin-top: -5px; }
    </style>
</head>
<body>

    <div id="chat">
        <div class="msg bot-msg"><b>Бот:</b> Привет! Пиши текст, прикрепляй файл или <b>просто вставь картинку (Ctrl+V)</b>.</div>
    </div>
    
    <div class="controls">
        <input type="file" id="fileInput" accept="image/*">
        <img id="preview">
        <div class="hint">Можно нажать Ctrl+V, чтобы вставить скриншот</div>
        <input type="text" id="userInput" placeholder="Ваш вопрос..." onkeypress="if(event.key==='Enter') send()">
        <div class="btn-group">
            <button id="sendBtn" onclick="send()">Отправить</button>
            <button onclick="document.getElementById('chat').innerHTML=''" style="background:#6c757d">Очистить</button>
        </div>
    </div>

    <script>
        // !!! ОБЯЗАТЕЛЬНО ЗАМЕНИ НА СВОЙ ПОЛНЫЙ URL !!!
        // Пример: 'https://proud-cloud-cb1b.spiderkaras.workers.dev'
        const WORKER_URL = 'https://proud-cloud-cb1b.spiderkaras.workers.dev/';

        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const chat = document.getElementById('chat');
        const userInput = document.getElementById('userInput');

        let selectedImageBase64 = null;
        let selectedImageType = null;

        // 1. Обработка выбора файла через кнопку
        fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

        // 2. Обработка вставки из буфера обмена (Ctrl+V)
        document.addEventListener('paste', (event) => {
            const items = (event.clipboardData || event.originalEvent.clipboardData).items;
            for (let index in items) {
                const item = items[index];
                if (item.kind === 'file' && item.type.startsWith('image/')) {
                    const blob = item.getAsFile();
                    handleFile(blob);
                }
            }
        });

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
                selectedImageBase64 = e.target.result.split(',')[1];
                selectedImageType = file.type;
            };
            reader.readAsDataURL(file);
        }

        async function send() {
            const text = userInput.value.trim();
            const btn = document.getElementById('sendBtn');
            if (!text && !selectedImageBase64) return;

            btn.disabled = true;
            chat.innerHTML += `<div class="msg user-msg"><b>Вы:</b> ${text} ${selectedImageBase64 ? '(картинка)' : ''}</div>`;
            chat.scrollTop = chat.scrollHeight;

            const payload = {
                message: text,
                imageBase64: selectedImageBase64,
                imageType: selectedImageType
            };

            // Очистка полей
            userInput.value = '';
            fileInput.value = '';
            preview.style.display = 'none';
            selectedImageBase64 = null;

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                chat.innerHTML += `<div class="msg bot-msg"><b>Бот:</b> ${data.reply}</div>`;
            } catch (err) {
                chat.innerHTML += `<div class="msg" style="color:red"><b>Ошибка:</b> Проверь URL воркера и API ключ.</div>`;
            } finally {
                btn.disabled = false;
                chat.scrollTop = chat.scrollHeight;
            }
        }
    </script>
</body>
</html>
