<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Cloudflare Proxy</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 600px; margin: 40px auto; background-color: #f4f4f9; padding: 20px; }
        h3 { color: #333; text-align: center; }
        #chat { height: 400px; border: 1px solid #ddd; overflow-y: auto; padding: 15px; margin-bottom: 15px; border-radius: 12px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .msg { margin-bottom: 12px; line-height: 1.4; }
        .user-msg { color: #2c3e50; }
        .bot-msg { color: #27ae60; background: #f0fff4; padding: 8px; border-radius: 8px; }
        .controls { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; outline: none; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

    <h3>Gemini через Cloudflare Worker</h3>
    <div id="chat"></div>
    <div class="controls">
        <input type="text" id="userInput" placeholder="Введите ваш вопрос..." onkeypress="if(event.key==='Enter') send()">
        <button id="sendBtn" onclick="send()">Отправить</button>
    </div>

    <script>
        // --- ЗАМЕНИ НА СВОЙ АДРЕС ИЗ CLOUDFLARE ---
        const WORKER_URL = 'https://proud-cloud-cb1b.spiderkaras.workers.dev
';

        async function send() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const btn = document.getElementById('sendBtn');
            const message = input.value.trim();
            
            if (!message) return;

            // Блокируем интерфейс
            input.value = '';
            input.disabled = true;
            btn.disabled = true;

            chat.innerHTML += `<div class="msg user-msg"><b>Вы:</b> ${message}</div>`;
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();
                const reply = data.reply || "Ошибка сервера";
                
                chat.innerHTML += `<div class="msg bot-msg"><b>Gemini:</b> ${reply}</div>`;
            } catch (err) {
                chat.innerHTML += `<div style="color:red" class="msg">Ошибка: Не удалось связаться с воркером. Проверьте CORS или URL.</div>`;
            } finally {
                input.disabled = false;
                btn.disabled = false;
                input.focus();
                chat.scrollTop = chat.scrollHeight;
            }
        }
    </script>
</body>
</html>
